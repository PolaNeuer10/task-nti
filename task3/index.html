<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="screen">8.3 + 1.7</div>
        
        <table>
            <tr>
                <td><button class="btn-orange">+</button></td>
                <td><button class="btn-orange">-</button></td>
                <td><button class="btn-orange">×</button></td>
                <td><button class="btn-orange">÷</button></td>
            </tr>
            <tr>
                <td><button class="btn-blue">7</button></td>
                <td><button class="btn-blue">8</button></td>
                <td><button class="btn-blue">9</button></td>
                <td><button class="btn-blue">4</button></td>
            </tr>
            <tr>
                <td><button class="btn-blue">5</button></td>
                <td><button class="btn-blue">6</button></td>
                <td><button class="btn-blue">1</button></td>
                <td><button class="btn-blue">2</button></td>
            </tr>
            <tr>
                <td><button class="btn-blue">3</button></td>
                <td><button class="btn-blue">0</button></td>
                <td><button class="btn-blue">.</button></td>
                <td><button class="btn-red">C</button></td>
            </tr>
        </table>
        
        <button class="btn-equal">=</button>
    </div>
</body>
</html>
